<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <linearGradient id="engineBayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hoodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- Carrocería frontal - silueta -->
  <path d="M 50,180 L 950,180 L 980,200 L 980,520 L 950,540 L 50,540 L 20,520 L 20,200 Z"
        fill="none" stroke="#4a5568" stroke-width="3" opacity="0.5"/>

  <!-- Capó abierto -->
  <path d="M 80,180 L 920,180 L 900,120 L 100,120 Z"
        fill="url(#hoodGrad)" stroke="#4a5568" stroke-width="2" opacity="0.4"/>

  <!-- Parabrisas -->
  <path d="M 100,120 L 900,120 L 880,80 L 120,80 Z"
        fill="none" stroke="#4a5568" stroke-width="2" opacity="0.3"/>

  <!-- Focos delanteros -->
  <ellipse cx="60" cy="360" rx="25" ry="40" fill="none" stroke="#4a5568" stroke-width="2" opacity="0.3"/>
  <ellipse cx="940" cy="360" rx="25" ry="40" fill="none" stroke="#4a5568" stroke-width="2" opacity="0.3"/>

  <!-- Vano del motor (área de trabajo) -->
  <rect x="80" y="190" width="840" height="340" rx="8"
        fill="url(#engineBayGrad)" stroke="#374151" stroke-width="1" opacity="0.3"/>

  <!-- Soporte del motor -->
  <rect x="350" y="480" width="300" height="20" rx="4"
        fill="#2d3748" stroke="#4a5568" stroke-width="1" opacity="0.3"/>

  <!-- Faros -->
  <circle cx="60" cy="360" r="15" fill="#f7fafc" opacity="0.15"/>
  <circle cx="940" cy="360" r="15" fill="#f7fafc" opacity="0.15"/>
</svg>
